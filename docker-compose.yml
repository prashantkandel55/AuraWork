version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aurawork
      POSTGRES_USER: aurawork
      POSTGRES_PASSWORD: aurawork
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: aurawork
      DB_PASSWORD: aurawork
      DB_NAME: aurawork
      JWT_SECRET: dev-secret
    depends_on:
      - db
    ports:
      - '3000:3000'

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    depends_on:
      - api
    ports:
      - '4173:4173'

  employee:
    build:
      context: .
      dockerfile: Dockerfile.employee
    depends_on:
      - api
    ports:
      - '4174:4174'

volumes:
  db_data: {}

